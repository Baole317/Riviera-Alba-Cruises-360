<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binh An CTV03</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        .pnlm-hotspot-base { cursor: pointer; }
        #panorama-viewer { width: 100%; height: 100%; background: #000; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        /* Style for the Excel table to match the UI */
        #kanban-container table { width: 100%; border-collapse: collapse; font-size: 10px; table-layout: fixed; }
        #kanban-container th, #kanban-container td { border: 1px solid #e5e7eb; padding: 4px; text-align: left; vertical-align: top; word-wrap: break-word; }
        #kanban-container th { font-weight: bold; text-align: center; }
        #kanban-container td { color: #374151; min-height: 20px; outline: none; }
        #kanban-container td:focus { background-color: rgba(0,0,0,0.02); }
        .row-action { width: 20px; text-align: center; cursor: pointer; color: #ef4444; opacity: 0; transition: opacity 0.2s; }
        tr:hover .row-action { opacity: 1; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans overflow-hidden h-screen flex">
    <!-- Sidebar -->
    <div class="w-72 border-r border-zinc-200 flex flex-col bg-white shadow-xl z-10 text-zinc-900">
        <div class="p-5 border-b border-zinc-200">
            <div class="flex items-center gap-3">
                <img src="https://binhanshipping.vn/wp-content/uploads/2024/07/cropped-logo-binh-an.webp" class="h-10 w-auto object-contain">
                <h1 class="text-base font-extrabold tracking-tight text-zinc-900 leading-tight">Binh An CTV03</h1>
            </div>
            <div class="mt-3 flex justify-between items-center">
                <span class="text-[9px] text-zinc-400 lowercase">created date: march 12, 2026</span>
                <span class="text-[9px] text-zinc-400 lowercase text-right">created by: bao le</span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-3">
            <div class="mb-6">
                <h2 class="text-[9px] font-bold text-zinc-400 uppercase tracking-wider px-1 mb-3">Danh Sách Điểm</h2>
                <div id="hotspot-list" class="space-y-1.5"></div>
            </div>

            <div class="pt-4 border-t border-zinc-100">
                <div class="flex items-center justify-between mb-3 px-1">
                    <h2 class="text-[9px] font-bold text-zinc-400 uppercase tracking-wider">Bảng Danh Mục</h2>
                    <button onclick="addKanbanRow()" class="text-[9px] bg-emerald-50 hover:bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded border border-emerald-200 transition-colors font-bold">+ Thêm hàng</button>
                </div>
                <div id="kanban-container" class="overflow-x-auto">
                    <table id="kanban-table">
                        <thead>
                            <tr class="text-zinc-600">
                                <th class="bg-red-50 text-red-700 border-red-100">To do</th>
                                <th class="bg-orange-50 text-orange-700 border-orange-100">In progress</th>
                                <th class="bg-green-50 text-green-700 border-green-100">Done</th>
                                <th style="width: 24px; border: none; background: transparent;"></th>
                            </tr>
                        </thead>
                        <tbody id="kanban-body">
                            <!-- Rows will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="p-4 bg-zinc-50 border-t border-zinc-200">
            <p class="text-[10px] text-zinc-400 text-center">© 2026 Binh An CTV03</p>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 relative bg-zinc-950 overflow-hidden flex items-center justify-center">
        <div id="site-plan-wrapper" class="relative max-w-full max-h-full shadow-2xl rounded-lg overflow-hidden hidden">
            <img id="site-plan-img" src="" class="max-w-full max-h-[90vh] object-contain select-none">
            <div id="pins-container"></div>
        </div>
        <div id="loading-state" class="text-center space-y-4">
            <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <p class="text-zinc-500 text-sm font-medium">Đang tải dữ liệu dự án...</p>
        </div>
    </div>

    <!-- 360 Viewer Modal -->
    <div id="viewer-modal" class="fixed inset-0 z-50 flex items-center justify-center p-8 bg-black/90 backdrop-blur-md hidden opacity-0 transition-opacity duration-300">
        <div class="relative w-full h-full bg-zinc-900 rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex flex-col">
            <!-- Modal Header -->
            <div class="p-4 border-b border-white/5 flex items-center justify-between bg-zinc-900/50 backdrop-blur-md">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-emerald-500/20 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-400"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    </div>
                    <div>
                        <h2 id="active-name" class="text-sm font-bold text-white">Tên điểm</h2>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold">360° Panorama View</p>
                    </div>
                </div>
                <button onclick="closeViewer()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-400"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <!-- Viewer Content -->
            <div class="flex-1 relative flex">
                <div id="panorama-viewer"></div>
                
                <!-- Internal List -->
                <div class="w-64 bg-zinc-900/80 backdrop-blur-xl border-l border-white/5 p-4 overflow-y-auto">
                    <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">Chuyển nhanh điểm nhìn</h3>
                    <div id="modal-hotspot-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let projectData = null;
        let viewer = null;

        async function init() {
            try {
                const response = await fetch('project_data.json');
                if (!response.ok) throw new Error('Không tìm thấy project_data.json');
                projectData = await response.json();
                
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('site-plan-wrapper').classList.remove('hidden');
                
                renderUI();
                loadKanbanData();
            } catch (e) {
                console.error(e);
                document.getElementById('loading-state').innerHTML = `
                    <div class="text-rose-500 font-bold">Lỗi nạp dữ liệu</div>
                    <p class="text-zinc-500 text-xs mt-2">Đảm bảo file project_data.json nằm cùng thư mục với file này.</p>
                `;
            }
        }

        function renderUI() {
            const list = document.getElementById('hotspot-list');
            const modalList = document.getElementById('modal-hotspot-list');
            const pins = document.getElementById('pins-container');
            const sitePlanImg = document.getElementById('site-plan-img');
            
            if (projectData.sitePlan) sitePlanImg.src = projectData.sitePlan;

            projectData.hotspots.forEach(h => {
                // Sidebar Item
                const item = document.createElement('div');
                item.className = 'flex items-center gap-2.5 p-2.5 rounded-lg border bg-zinc-50 border-zinc-200 hover:border-emerald-500 hover:bg-emerald-50 cursor-pointer transition-all group';
                item.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-400 group-hover:text-emerald-600"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg><span class="text-xs font-medium text-zinc-700">' + h.name + '</span>';
                item.onclick = () => openViewer(h);
                list.appendChild(item);

                // Modal Item
                const modalItem = document.createElement('div');
                modalItem.className = 'w-full flex items-center gap-3 p-3 rounded-xl border bg-zinc-800/50 border-zinc-700/50 text-zinc-400 hover:border-emerald-500 hover:bg-emerald-500/10 cursor-pointer transition-all';
                modalItem.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg><span class="text-xs font-bold truncate">' + h.name + '</span>';
                modalItem.onclick = () => openViewer(h);
                modalList.appendChild(modalItem);

                // Map Pin
                const pin = document.createElement('div');
                pin.className = 'absolute w-4 h-4 -ml-2 -mt-4 cursor-pointer z-20 flex flex-col items-center';
                pin.style.left = h.x + '%';
                pin.style.top = h.y + '%';
                pin.innerHTML = '<div class="p-0.5 rounded-full border bg-orange-600/50 border-white shadow-lg hover:scale-110 transition-transform"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg></div><div class="mt-0.5 px-1 py-0.5 bg-zinc-900/60 backdrop-blur-sm rounded text-[8px] font-bold text-white whitespace-nowrap border border-white/10 shadow-xl">' + h.name + '</div>';
                pin.onclick = () => openViewer(h);
                pins.appendChild(pin);
            });
        }

        function openViewer(h) {
            const modal = document.getElementById('viewer-modal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            
            document.getElementById('active-name').innerText = h.name;
            
            if (viewer) viewer.destroy();
            
            viewer = pannellum.viewer('panorama-viewer', {
                type: 'equirectangular',
                panorama: h.imageData,
                autoLoad: true,
                showControls: true,
                hotSpots: (h.links || []).map(link => {
                    const target = projectData.hotspots.find(item => item.id === link.targetId);
                    return {
                        pitch: link.pitch,
                        yaw: link.yaw,
                        type: 'info',
                        text: target ? target.name : 'Liên kết',
                        clickHandlerFunc: () => openViewer(target)
                    };
                })
            });
        }

        function closeViewer() {
            const modal = document.getElementById('viewer-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                if (viewer) viewer.destroy();
                viewer = null;
            }, 300);
        }

        // Kanban Table Logic
        function addKanbanRow(todo = "", progress = "", done = "") {
            const body = document.getElementById('kanban-body');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td contenteditable="true" oninput="saveKanbanData()" class="bg-red-50/30">${todo}</td>
                <td contenteditable="true" oninput="saveKanbanData()" class="bg-orange-50/30">${progress}</td>
                <td contenteditable="true" oninput="saveKanbanData()" class="bg-green-50/30">${done}</td>
                <td class="row-action" onclick="removeKanbanRow(this)">×</td>
            `;
            body.appendChild(tr);
            saveKanbanData();
        }

        function removeKanbanRow(btn) {
            btn.parentElement.remove();
            saveKanbanData();
        }

        function saveKanbanData() {
            const rows = [];
            const trs = document.querySelectorAll('#kanban-body tr');
            trs.forEach(tr => {
                const tds = tr.querySelectorAll('td');
                rows.push({
                    todo: tds[0].innerText,
                    progress: tds[1].innerText,
                    done: tds[2].innerText
                });
            });
            localStorage.setItem('binh_an_kanban_data', JSON.stringify(rows));
        }

        function loadKanbanData() {
            const saved = localStorage.getItem('binh_an_kanban_data');
            const body = document.getElementById('kanban-body');
            body.innerHTML = "";
            
            if (saved) {
                const data = JSON.parse(saved);
                if (data.length > 0) {
                    data.forEach(row => addKanbanRow(row.todo, row.progress, row.done));
                    return;
                }
            }
            
            // Default rows if empty
            addKanbanRow("", "", "");
            addKanbanRow("", "", "");
            addKanbanRow("", "", "");
        }

        window.onload = init;
    </script>
</body>
</html>
